<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetNgai - เข้าสู่ระบบ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <main class="login-card card">
    <div class="container">
        <h2>🔐 เข้าสู่ระบบ</h2>
        <form method="POST" action="/login">
            <label for="username">ชื่อผู้ใช้</label>
            <input type="text" id="username" name="username" required>
            <label for="password">รหัสผ่าน</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">เข้าสู่ระบบ</button>
        </form>
        <!-- error message if ?error=1 -->
        <script>
            if(location.search.includes('error=1')){
                const msg=document.createElement('p');
                msg.style.color='red';
                msg.textContent='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
                document.querySelector('.login-card').appendChild(msg);
            }
        </script>
        </div>
    </main>
</body>
</html>
