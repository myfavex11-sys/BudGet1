<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetNgai - ประวัติการทำธุรกรรม</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <h1>💰 BudgetNgai</h1>
            <div style="text-align: right;">
                <p style="margin: 0; font-size: 0.9rem; color: #666;">
                    👨‍👩‍👧 <span id="family-name" style="font-weight: 600; color: #333;"></span>
                </p>
                <nav style="margin: 0;">
                    <a href="index.html">🏠 Dashboard</a>
                    <a href="history.html">📋 ประวัติ</a>
                    <a href="settings.html">⚙️ ตั้งค่า</a>
                    <a href="/logout">🔓 ออกจากระบบ</a>
                </nav>
            </div>
        </div>
    </header>

    <div id="notification-area" style="position:fixed;top:4rem;right:1rem;z-index:1001;display:flex;flex-direction:column;gap:.5rem;"></div>

    <main class="dashboard">
        <div class="container">
            <section class="settings-section">
                <div class="section-header">
                    <h2>📋 ประวัติการทำธุรกรรมทั้งหมด</h2>
                    <p>รายการบันทึกธุรกรรมของครอบครัวทั้งหมด</p>
                </div>
                
                <!-- Filter buttons -->
                <div class="filter-section" style="margin-bottom: 1.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap;">
                    <button class="filter active" data-range="all">📋 ทั้งหมด</button>
                    <button class="filter" data-range="today">📅 วันนี้</button>
                    <button class="filter" data-range="week">📆 สัปดาห์นี้</button>
                    <button class="filter" data-range="month">🗓️ เดือนนี้</button>
                    <button class="filter" data-range="expense" style="background:#ff6b6b;">📉 รายจ่าย</button>
                    <button class="filter" data-range="income" style="background:#51cf66;">📈 รายรับ</button>
                </div>

                <!-- Transactions list -->
                <div class="settings-card">
                    <div id="transactions-container" style="max-height: 800px; overflow-y: auto;">
                        <div style="text-align: center; padding: 2rem; color: #999;">
                            ⏳ กำลังโหลด...
                        </div>
                    </div>
                </div>

                <!-- Back button -->
                <div style="margin-top: 2rem;">
                    <a href="index.html" style="display: inline-block; padding: 0.75rem 1.5rem; background: linear-gradient(135deg, #4a90e2, #50c9e0); color: #fff; border-radius: 12px; text-decoration: none; font-weight: 600; transition: all 0.3s ease;">
                        ← กลับไปแดชบอร์ด
                    </a>
                </div>
            </section>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        // Load and display transactions
        async function loadTransactionsHistory() {
            await fetchTransactions();
            renderTransactionsHistory('all');
        }

        // Member name mapping
        const memberNames = {
            'father': '👨 พ่อ',
            'mother': '👩 แม่',
            'child': '👧 ลูก'
        };

        function renderTransactionsHistory(filterType = 'all') {
            const container = document.getElementById('transactions-container');
            if (!container) return;

            let filtered = [...transactions].reverse(); // Show newest first

            const now = new Date();
            if (filterType === 'today') {
                filtered = filtered.filter(t => new Date(t.date).toDateString() === now.toDateString());
            } else if (filterType === 'week') {
                const weekAgo = new Date(now);
                weekAgo.setDate(now.getDate() - 7);
                filtered = filtered.filter(t => new Date(t.date) >= weekAgo);
            } else if (filterType === 'month') {
                const monthAgo = new Date(now);
                monthAgo.setMonth(now.getMonth() - 1);
                filtered = filtered.filter(t => new Date(t.date) >= monthAgo);
            } else if (filterType === 'expense') {
                filtered = filtered.filter(t => t.type === 'expense');
            } else if (filterType === 'income') {
                filtered = filtered.filter(t => t.type === 'income');
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem; color: #999;">ไม่มีธุรกรรม</div>';
                return;
            }

            container.innerHTML = '';
            const table = document.createElement('table');
            table.style.width = '100%';
            table.style.borderCollapse = 'collapse';

            // Header
            const thead = document.createElement('thead');
            thead.innerHTML = `
                <tr style="background: #f5f7fa; border-bottom: 2px solid #4a90e2;">
                    <th style="padding: 1rem; text-align: left; font-weight: 600;">วันที่</th>
                    <th style="padding: 1rem; text-align: left; font-weight: 600;">คน</th>
                    <th style="padding: 1rem; text-align: left; font-weight: 600;">ประเภท</th>
                    <th style="padding: 1rem; text-align: left; font-weight: 600;">หมวดหมู่</th>
                    <th style="padding: 1rem; text-align: right; font-weight: 600;">จำนวนเงิน</th>
                </tr>
            `;
            table.appendChild(thead);

            // Body
            const tbody = document.createElement('tbody');
            filtered.forEach((tx, idx) => {
                const row = document.createElement('tr');
                row.style.borderBottom = '1px solid #eee';
                row.style.cursor = 'pointer';
                row.style.transition = 'background 0.3s ease';
                if (idx % 2 === 0) {
                    row.style.background = 'rgba(255,255,255,0.5)';
                }
                
                // Hover effect
                row.addEventListener('mouseenter', () => {
                    row.style.background = 'rgba(74, 144, 226, 0.1)';
                });
                row.addEventListener('mouseleave', () => {
                    row.style.background = idx % 2 === 0 ? 'rgba(255,255,255,0.5)' : 'white';
                });

                // Get member name with fallback
                const member = memberNames[tx.member] || (members?.find(m => m.id === tx.member)?.name) || tx.member || 'ไม่ระบุ';
                const category = tx.category?.parent || 'อื่นๆ';
                const typeLabel = tx.type === 'expense' ? '📉 รายจ่าย' : '📈 รายรับ';
                const typeColor = tx.type === 'expense' ? '#ff6b6b' : '#51cf66';
                const date = new Date(tx.date).toLocaleDateString('th-TH', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });

                row.innerHTML = `
                    <td style="padding: 1rem; font-size: 0.9rem;">${date}</td>
                    <td style="padding: 1rem; font-weight: 500;">${member}</td>
                    <td style="padding: 1rem; color: ${typeColor}; font-weight: 600;">${typeLabel}</td>
                    <td style="padding: 1rem;">${category}</td>
                    <td style="padding: 1rem; text-align: right; font-weight: 600; color: ${typeColor};">
                        ${tx.type === 'expense' ? '-' : '+'}฿${Number(tx.amount).toLocaleString()}
                    </td>
                `;
                
                // Click handler to go to main form with pre-filled data
                row.addEventListener('click', () => {
                    sessionStorage.setItem('prefillMember', tx.member);
                    sessionStorage.setItem('prefillCategory', tx.category.id);
                    sessionStorage.setItem('prefillType', tx.type);
                    window.location.href = 'index.html';
                });
                
                tbody.appendChild(row);
            });

            table.appendChild(tbody);
            container.appendChild(table);
        }

        // Handle filter buttons
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('history.html loaded');
            await loadTransactionsHistory();

            // Filter button handlers
            document.querySelectorAll('.filter').forEach(btn => {
                btn.addEventListener('click', e => {
                    document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderTransactionsHistory(btn.dataset.range);
                });
            });

            // Load user info
            try {
                const res = await fetch('/api/user');
                if (res.ok) {
                    const data = await res.json();
                    if (data.success && data.user) {
                        document.getElementById('family-name').textContent = data.user.family_name;
                    }
                }
            } catch (error) {
                console.error('Error loading user info:', error);
            }
        });
    </script>
</body>
</html>
