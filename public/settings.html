<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetNgai - ตั้งค่า</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <h1>💰 BudgetNgai</h1>
            <div style="text-align: right;">
                <p style="margin: 0; font-size: 0.9rem; color: #666;">
                    👨‍👩‍👧 <span id="family-name" style="font-weight: 600; color: #333;"></span>
                </p>
                <nav style="margin: 0;">
                    <a href="index.html">🏠 Dashboard</a>
                    <a href="history.html">📋 ประวัติ</a>
                    <a href="settings.html">⚙️ ตั้งค่า</a>
                    <a href="/logout">🔓 ออกจากระบบ</a>
                </nav>
            </div>
        </div>
    </header>
    
    <main class="settings-main">
        <div class="container">
            <!-- Back to Dashboard button -->
            <div style="margin-bottom: 2rem;">
                <a href="/home.html" style="display: inline-block; padding: 0.75rem 1.5rem; background: linear-gradient(135deg, #999, #bbb); color: #fff; border-radius: 12px; text-decoration: none; font-weight: 600; transition: all 0.3s ease;">
                    ← กลับไปหน้าแรก
                </a>
            </div>

            <!-- Users Section -->
            <section class="settings-section">
                <div class="section-header">
                    <h2>👥 สมาชิกครอบครัว</h2>
                    <p>จัดการสมาชิกและสิทธิ์การใช้งาน</p>
                </div>
                <div class="settings-card">
                    <ul id="user-list" class="user-list">
                        <!-- Generated by JS -->
                    </ul>
                    <button id="add-user" class="btn-primary">➕ เพิ่มสมาชิกใหม่</button>
                </div>
            </section>

            <!-- Budget Section -->
            <section class="settings-section">
                <div class="section-header">
                    <h2>🎯 งบประมาณรายเดือน</h2>
                    <p>ตั้งเป้าหมายค่าใช้จ่ายรายเดือน</p>
                </div>
                <div class="settings-card budget-card">
                    <div class="budget-inputs">
                        <div class="budget-item">
                            <label>👨 พ่อ</label>
                            <div class="input-wrapper">
                                <span class="currency">฿</span>
                                <input type="number" id="budget-father" min="0" placeholder="0.00">
                            </div>
                        </div>
                        <div class="budget-item">
                            <label>👩 แม่</label>
                            <div class="input-wrapper">
                                <span class="currency">฿</span>
                                <input type="number" id="budget-mother" min="0" placeholder="0.00">
                            </div>
                        </div>
                        <div class="budget-item">
                            <label>👧 ลูก</label>
                            <div class="input-wrapper">
                                <span class="currency">฿</span>
                                <input type="number" id="budget-child" min="0" placeholder="0.00">
                            </div>
                        </div>
                    </div>
                    <button id="save-budgets" class="btn-primary">💾 บันทึกงบประมาณ</button>
                </div>
            </section>

            <!-- Categories Section -->
            <section class="settings-section">
                <div class="section-header">
                    <h2>🗂️ หมวดหมู่รายจ่าย</h2>
                    <p>จัดการหมวดหมู่และหมวดย่อย</p>
                </div>
                <div class="settings-card categories-card">
                    <div class="add-category-btn-wrapper">
                        <button id="add-parent-category" class="btn-secondary">➕ เพิ่มหมวดหมู่ใหม่</button>
                    </div>
                    <ul id="parent-category-list" class="category-tree">
                        <!-- Generated by JS -->
                    </ul>
                </div>
            </section>
        </div>
    </main>

    <script>
        // Fetch and display family name
        async function loadUserInfo() {
            try {
                const res = await fetch('/api/user');
                if (res.ok) {
                    const data = await res.json();
                    if (data.success && data.user) {
                        document.getElementById('family-name').textContent = data.user.family_name;
                    }
                }
            } catch (error) {
                console.error('Error loading user info:', error);
            }
        }
        loadUserInfo();
    </script>
    
    <script src="js/app.js"></script>
</body>
</html>
