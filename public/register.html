<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetNgai - สมัครสมาชิก</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8f1f8 100%);
        }

        .auth-container {
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(250,250,255,0.9));
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.5);
            width: 100%;
            max-width: 420px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #4a90e2, #50c9e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.9);
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74,144,226,0.1);
            background: #fff;
        }

        .form-help {
            font-size: 0.8rem;
            color: #999;
            margin-top: 0.3rem;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #4a90e2, #50c9e0);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(74,144,226,0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74,144,226,0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
        }

        .auth-footer p {
            color: #666;
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef5350;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #66bb6a;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 2rem;
                margin: 1rem;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>💰 BudgetNgai</h1>
            <p>สร้างบัญชีใหม่ของคุณ</p>
        </div>

        <div id="alert-container"></div>

        <form id="register-form">
            <div class="form-group">
                <label for="family-name">👨‍👩‍👧‍👦 ชื่อครอบครัว *</label>
                <input 
                    type="text" 
                    id="family-name" 
                    name="family_name" 
                    required 
                    placeholder="เช่น ครอบครัวสมชาย"
                >
                <div class="form-help">ชื่อที่ใช้ระบุครอบครัวของคุณ</div>
            </div>

            <div class="form-group">
                <label for="username">👤 ชื่อผู้ใช้ *</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    placeholder="เช่น somchai123"
                    minlength="4"
                >
                <div class="form-help">ต้องมีอย่างน้อย 4 ตัวอักษร ไม่มีช่องว่าง</div>
            </div>

            <div class="form-group">
                <label for="password">🔐 รหัสผ่าน *</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    placeholder="กรอกรหัสผ่าน"
                    minlength="6"
                >
                <div class="form-help">ต้องมีอย่างน้อย 6 ตัวอักษร</div>
            </div>

            <div class="form-group">
                <label for="password-confirm">🔐 ยืนยันรหัสผ่าน *</label>
                <input 
                    type="password" 
                    id="password-confirm" 
                    name="password_confirm" 
                    required 
                    placeholder="กรอกรหัสผ่านอีกครั้ง"
                >
                <div class="form-help">ต้องตรงกับรหัสผ่านข้างบน</div>
            </div>

            <button type="submit" class="btn-submit">📝 สมัครสมาชิก</button>
        </form>

        <div class="auth-footer">
            <p>มีบัญชีแล้ว? <a href="/login.html">เข้าสู่ระบบ</a></p>
            <p style="margin-top: 0.5rem;">
                <a href="/home.html" style="color: #999;">← กลับหน้าแรก</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('register-form');
        const alertContainer = document.getElementById('alert-container');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const familyName = document.getElementById('family-name').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;

            // Validation
            if (!familyName) {
                showAlert('กรุณากรอกชื่อครอบครัว', 'error');
                return;
            }

            if (!username) {
                showAlert('กรุณากรอกชื่อผู้ใช้', 'error');
                return;
            }

            if (username.length < 4) {
                showAlert('ชื่อผู้ใช้ต้องมีอย่างน้อย 4 ตัวอักษร', 'error');
                return;
            }

            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                showAlert('ชื่อผู้ใช้สามารถมีเฉพาะตัวอักษร ตัวเลข และขีดเว้น (_) เท่านั้น', 'error');
                return;
            }

            if (password.length < 6) {
                showAlert('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error');
                return;
            }

            if (password !== passwordConfirm) {
                showAlert('รหัสผ่านไม่ตรงกัน', 'error');
                return;
            }

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ family_name: familyName, username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showAlert('✅ สมัครสมาชิกสำเร็จ! กำลังไปยังหน้าเข้าสู่ระบบ...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 1500);
                } else {
                    showAlert(data.error || 'เกิดข้อผิดพลาด กรุณาลองใหม่', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
            }
        });

        function showAlert(message, type) {
            alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            alertContainer.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
