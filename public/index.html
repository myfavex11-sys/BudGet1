<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetNgai - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <h1>BudgetNgai</h1>
        <nav>
            <a href="index.html">🏠 Dashboard</a>
            <a href="settings.html">⚙️ ตั้งค่า</a>
            <a href="/logout">🔓 ออกจากระบบ</a>
        </nav>
    </header>
    <div id="notification-area" style="position:fixed;top:4rem;right:1rem;z-index:1001;display:flex;flex-direction:column;gap:.5rem;"></div>
    <main class="dashboard">
    <div class="container">
        <section class="summary">
            <div class="summary-card balance-card">
                <h2>💰 ยอดคงเหลือ</h2>
                <p id="total-balance">฿0.00</p>
            </div>
            <div class="summary-card income-card">
                <h2>📈 รายรับรวม <span id="income-trend">▲</span></h2>
                <p id="total-income">฿0.00</p>
            </div>
            <div class="summary-card expense-card">
                <h2>📉 รายจ่ายรวม <span id="expense-trend">▼</span></h2>
                <p id="total-expense">฿0.00</p>
            </div>
        </section>
        <section class="summary">
            <div class="chart-card">
                <h2>🗂️ สัดส่วนตามกลุ่มใหญ่</h2>
                <canvas id="category-chart" width="200" height="200"></canvas>
            </div>
            <div class="chart-card">
                <h2>👨‍👩‍👧‍👦 สัดส่วนสมาชิก</h2>
                <canvas id="member-chart" width="200" height="200"></canvas>
            </div>
            <div class="chart-card">
                <h2>📊 แนวโน้มรายจ่าย 6 เดือน</h2>
                <canvas id="trend-chart" width="400" height="200"></canvas>
            </div>
        </section>
        <section class="member-breakdown">
            <div class="father">
                <strong>พ่อ</strong>
                <p id="father-total">฿0.00</p>
                <div class="progress" id="father-progress"></div>
            </div>
            <div class="mother">
                <strong>แม่</strong>
                <p id="mother-total">฿0.00</p>
                <div class="progress" id="mother-progress"></div>
            </div>
            <div class="child">
                <strong>ลูก</strong>
                <p id="child-total">฿0.00</p>
                <div class="progress" id="child-progress"></div>
            </div>
        </section>
        <section class="quick-actions">
            <button id="add-transaction" class="fab">➕</button>
            <button id="manage-categories">🗃️ จัดการหมวดหมู่</button>
        </section>
        <section class="transaction-form-enhanced" id="transaction-section" style="display:none;">
            <h2>➕ เพิ่มธุรกรรมใหม่</h2>
            
            <!-- Member Selection -->
            <div class="form-section">
                <label>เลือกสมาชิก</label>
                <div class="member-buttons">
                    <button type="button" class="member-btn" data-member="father" style="background:#4a90e2;">👨 พ่อ</button>
                    <button type="button" class="member-btn" data-member="mother" style="background:#ff69b4;">👩 แม่</button>
                    <button type="button" class="member-btn" data-member="child" style="background:#ffd700;color:#333;">👧 ลูก</button>
                </div>
                <input type="hidden" id="tx-member" name="member" value="father">
            </div>
            
            <form class="transaction-form" id="transaction-form" enctype="multipart/form-data">
                <div class="form-section">
                    <label>ประเภท</label>
                    <div class="transaction-type-buttons">
                        <button type="button" class="type-btn active" data-type="expense" style="background:#ff6b6b;">📉 รายจ่าย</button>
                        <button type="button" class="type-btn" data-type="income" style="background:#51cf66;">📈 รายรับ</button>
                    </div>
                    <select id="tx-type" name="type" style="display:none;">
                        <option value="expense">รายจ่าย</option>
                        <option value="income">รายรับ</option>
                    </select>
                </div>
                
                <div class="form-section">
                    <label>จำนวนเงิน (ตัวเลขขนาดใหญ่)</label>
                    <div class="amount-display">฿<span id="amount-display">0</span></div>
                    <div class="number-pad">
                        <button type="button" class="pad-btn">1</button>
                        <button type="button" class="pad-btn">2</button>
                        <button type="button" class="pad-btn">3</button>
                        <button type="button" class="pad-btn">4</button>
                        <button type="button" class="pad-btn">5</button>
                        <button type="button" class="pad-btn">6</button>
                        <button type="button" class="pad-btn">7</button>
                        <button type="button" class="pad-btn">8</button>
                        <button type="button" class="pad-btn">9</button>
                        <button type="button" class="pad-btn">0</button>
                        <button type="button" class="pad-btn pad-backspace">⌫</button>
                        <button type="button" class="pad-btn pad-dot">.</button>
                    </div>
                    <input type="hidden" id="tx-amount" name="amount" value="0">
                </div>
                
                <div class="form-section">
                    <label>หมวดหมู่</label>
                    <div class="category-icons" id="category-icons">
                        <!-- Generated by JS -->
                    </div>
                    <input type="hidden" id="tx-category" name="category" value="">
                </div>
                
                <div class="form-section">
                    <label>วันที่</label>
                    <input type="date" id="tx-date" name="date" required>
                </div>
                
                <div class="form-section">
                    <label>หมายเหตุ</label>
                    <textarea id="tx-note" name="note" rows="2"></textarea>
                </div>
                
                <div class="form-section">
                    <label>แนบรูปใบเสร็จ</label>
                    <input type="file" id="tx-receipt" name="receipt" accept="image/*">
                </div>
                
                <div style="display:flex;gap:1rem;justify-content:flex-end;">
                    <button type="submit" class="btn-submit">✓ บันทึก</button>
                    <button type="button" id="tx-cancel" class="btn-cancel">✕ ยกเลิก</button>
                </div>
            </form>
        </section>
    </main>
    </div> <!-- end container -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- modal for receipt -->
    <div id="receipt-modal" class="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);justify-content:center;align-items:center;">
        <img id="receipt-img" src="" style="max-width:90%;max-height:90%;border-radius:12px;" />
    </div>
    <div id="flash-message" style="position:fixed;top:5rem;left:50%;transform:translateX(-50%);padding:1rem 2rem;background:#ffeaa7;border-radius:8px;display:none;z-index:1000;"></div>
    <script src="js/app.js"></script>
</body>
</html>
